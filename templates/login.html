<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Diet Impact Analyser</title>
  <meta name="description" content="Log in to track your daily nutrition and analyse your diet impact." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="flash-container">
  {% for cat, msg in messages %}
  <div class="flash-msg flash-{{ cat }}" id="flashMsg">
    <i class="bi bi-{% if cat == 'error' %}exclamation-circle{% elif cat == 'success' %}check-circle{% else %}info-circle{% endif %}"></i>
    {{ msg }}
  </div>
  {% endfor %}
</div>
{% endif %}
{% endwith %}

<div class="auth-page">
  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <span class="icon">🥗</span>
      <h2>Diet<span class="brand-accent">Impact</span></h2>
      <p>Sign in to your personal nutrition tracker</p>
    </div>

    <!-- Login Form -->
    <form method="POST" action="/login" id="loginForm" novalidate>
      <div class="auth-form-group">
        <label class="form-label" for="username">
          <i class="bi bi-person me-1"></i>Username
        </label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-control"
          placeholder="Enter your username"
          autocomplete="username"
          required
          autofocus
        />
      </div>

      <div class="auth-form-group">
        <label class="form-label" for="password">
          <i class="bi bi-lock me-1"></i>Password
        </label>
        <div class="pw-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
          <button type="button" class="pw-toggle" id="togglePw" title="Show/hide password">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-24" style="margin-bottom:20px">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember" name="remember" style="background:var(--glass);border-color:var(--glass-bd);">
          <label class="form-check-label" for="remember" style="font-size:0.85rem;color:var(--text-2);">
            Remember me
          </label>
        </div>
      </div>

      <button type="submit" class="btn-primary-custom w-100" id="loginBtn" style="padding:13px;">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="auth-footer-link">
      Don't have an account? <a href="/register">Create one →</a>
    </div>
  </div>
</div>

<script>
  // Password toggle
  document.getElementById('togglePw').addEventListener('click', function() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      pw.type = 'password';
      icon.className = 'bi bi-eye';
    }
  });

  // Auto-dismiss flash messages
  const flash = document.getElementById('flashMsg');
  if (flash) setTimeout(() => flash.style.opacity = '0', 4000);

  // Button loading state
  document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = document.getElementById('loginBtn');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';
    btn.disabled = true;
  });
</script>
</body>
</html>
